<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelaria - Painel de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <!-- HEADER -->
        <header class="header">
            <h1>🍴 Painel de Pedidos</h1>
      
            <div class="dashboard">
              <div class="card">
                <h3>Pedidos</h3>
                <p id="totalPedidos">0</p>
              </div>
      
              <div class="card">
                <h3>Total R$</h3>
                <p id="totalValor">0.00</p>
              </div>
      
              <div class="card">
                <h3>Ticket Médio</h3>
                <p id="ticketMedio">0.00</p>
              </div>
            </div>
          </header>

          <!-- POPOVERS -->

          <!-- ITEM MANUAL -->
          <div class="itensManuaisPopover">
            <div id="itensManuais">
              a
            </div>
          </div>

          <!-- CARDAPIO -->
          <div class="cardapioPopover">
            <div id="cardapio">
              b
            </div>
          </div>

        <!-- MAIN -->
          <main class="conteiner">
              <!-- ➕ FORMULÁRIO -->
              <section class="form">
                <h2>➕ Novo Pedido</h2>
              
                <form id="pedidoForm">
              
                  <!-- 👤 CLIENTE -->
                  <div class="cliente">
                    <h3>Informações do Cliente</h3>
              
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
              
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone">
              
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco">
              
                    <label for="tipo">Tipo</label>
                    <select id="tipo">
                      <option value="balcao">Balcão</option>
                      <option value="delivery">Delivery</option>
                    </select>
              
                    <label>Pagamento</label>
                    <select id="pagamento">
                      <option>Cartão</option>
                      <option>Pix</option>
                      <option>Dinheiro</option>
                    </select>
                  </div>

                  <!-- ➕ ADIÇÃO MANUAL -->

                    <div class="manual">
                      <h3>Itens Avulsos</h3>
                      <button type="button" id="btnPopoverItens"> + Adicionar Item Manual</button>
                    </div>
              
                  <!-- 📋 CARDÁPIO -->
                  <div class="cardapio">
                    <h3>Itens do Cardápio</h3>
              
                    <div id="listaCardapio"></div>
              
                    <button type="button" id="addProduto"> + Adicionar Produto ao Cardápio</button>
                  </div>
              
                  <div class="criar">
                    <h3>Total: R$ <span id="total">0.00</span></h3>
                    <!-- OBS -->
                    <div class="obs">
                      <label for="obs">Observação</label>
                      <textarea id="obs"></textarea>
                    </div>
                    <button type="submit" id="criarPedido">Criar Pedido</button>
                  </div>
                </form>
              </section>










              
              <!-- 📋 LISTA DE PEDIDOS -->
              <section class="lista">
                <h2>Pedidos Recebidos</h2>
                <div id="listaPedidos">
                  <!-- JS vai inserir os pedidos aqui -->
              
                  <!-- Exemplo de card -->
                  <!--
                  <div class="pedido-card">
                    <h4>#01 João</h4>
                    <p>2 queijo, 1 carne</p>
                    <span>R$ 25</span>
                    <div class="acoes">
                      <button>Aceitar</button>
                      <button>Cancelar</button>
                    </div>
                  </div>
                  -->
                </div>
              </section>

                   <!-- 📦 KANBAN -->
            <section class="kanban">
                <div class="coluna">
                  <h3>🟡 Em preparo</h3>
                  <div id="emPreparo"></div>
                </div>
                <div class="coluna">
                  <h3>🟢 Prontos</h3>
                  <div id="pronto"></div>
                </div>
                <div class="coluna">
                  <h3>⚫ Finalizados</h3>
                  <div id="finalizado"></div>
                </div>
              </section>
          </main>

      
    <script src="scripts/item-avulso.js"></script>
    <script src="scripts/cardapio.js"></script>
</body>
</html>
